<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
<script src="https://unonibes4a.github.io/pintaresta/toolscanvsa2025dc.js"></script>
<title>Pintaresta Gallery</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif}
.header{position:fixed;top:0;left:0;right:0;background:#fff;padding:16px 24px;z-index:1000;box-shadow:0 1px 0 rgba(0,0,0,.08)}
.header-content{max-width:1640px;margin:0 auto;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.logo{font-size:24px;font-weight:700;color:#e60023;text-decoration:none;padding:12px 16px;border-radius:24px;transition:background .2s}
.logo:hover{background:#f0f0f0}
.search-container{flex:1;max-width:800px}
.search-bar{display:flex;align-items:center;background:#efefef;border-radius:24px;padding:12px 16px}
.search-bar input{flex:1;border:none;background:transparent;outline:none;font-size:16px;color:#333;padding:0 8px}
.nav-buttons{display:flex;gap:8px;flex-wrap:wrap}
.nav-btn{background:#efefef;border:none;padding:10px 20px;border-radius:24px;font-weight:600;font-size:14px;cursor:pointer;transition:all .2s;color:#211922;position:relative}
.nav-btn:hover:not(:disabled){background:#e1e1e1}
.nav-btn:disabled{opacity:.4;cursor:not-allowed}
.nav-btn.upload-btn{background:#00d084;color:#fff}
.nav-btn.upload-btn:hover{background:#00b872}
.nav-btn input[type=file]{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;cursor:pointer}
.lote-info{padding:8px 16px;background:#efefef;border-radius:24px;font-size:12px;color:#5f5f5f;font-weight:500}
.main-content{margin-top:80px;padding:0 16px}
.pins-container{column-count:5;column-gap:16px;max-width:1640px;margin:0 auto}
@media(max-width:1536px){.pins-container{column-count:4}}
@media(max-width:1280px){.pins-container{column-count:3}}
@media(max-width:900px){.pins-container{column-count:2}}
@media(max-width:600px){.pins-container{column-count:1}}
.pin{break-inside:avoid;margin-bottom:16px;cursor:pointer;border-radius:16px;overflow:hidden;transition:all .3s;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.pin:hover{transform:scale(1.02);box-shadow:0 0 30px rgba(0,0,0,.1)}
.pin-image-container{position:relative;width:100%;overflow:hidden;border-radius:16px;background:#e0e0e0;display:flex;align-items:center;justify-content:center}
.pin-image{width:100%;display:block;transition:transform .3s;object-fit:cover}
.pin:hover .pin-image{transform:scale(1.03)}
.pin-image.model-thumb{width:100%;height:280px;object-fit:cover}
video.pin-image{background:#000}
video.pin-image::-webkit-media-controls{display:none!important}
.save-btn{position:absolute;top:12px;right:12px;background:#e60023;color:#fff;border:none;padding:10px 16px;border-radius:24px;font-weight:600;font-size:14px;cursor:pointer;opacity:0;transform:translateY(-4px);transition:all .2s}
.pin:hover .save-btn{opacity:1;transform:translateY(0)}
.save-btn:hover{background:#ad081b}
.pin-info{padding:12px;background:#fff}
.pin-title{font-size:14px;font-weight:600;color:#211922;margin-bottom:4px}
.pin-description{font-size:12px;color:#5f5f5f}
.pin-creator{display:flex;align-items:center;gap:8px;margin-top:8px;padding-top:8px;border-top:1px solid #efefef}
.creator-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#e60023,#ff006e);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:12px}
.creator-name{font-size:12px;color:#211922;font-weight:500}
.h-280{height:280px}.h-320{height:320px}.h-360{height:360px}.h-400{height:400px}.h-440{height:440px}
.media-badge{position:absolute;top:10px;left:10px;background:rgba(230,0,35,.9);color:#fff;padding:4px 8px;border-radius:12px;font-size:12px;font-weight:600}
.loading-screen{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,.95);display:flex;align-items:center;justify-content:center;z-index:3000;flex-direction:column;gap:20px}
.loading-spinner{width:50px;height:50px;border:4px solid #efefef;border-top:4px solid #e60023;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.loading-text{font-size:16px;color:#5f5f5f}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:2000;align-items:center;justify-content:center;padding:20px}
.modal-overlay.active{display:flex}
.modal-content{background:#fff;border-radius:16px;width:100%;max-height:90vh;overflow:hidden;display:flex;flex-direction:column}
.modal-content.sm{max-width:800px}
.modal-content.lg{max-width:95vw;height:90vh}
.modal-header{padding:16px 20px;border-bottom:1px solid #efefef;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;flex-shrink:0}
.modal-header h2{margin:0;color:#211922;font-size:16px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.modal-body{padding:0;overflow:hidden;flex:1;display:flex;flex-direction:column;min-height:0}
.modal-footer{padding:16px 20px;border-top:1px solid #efefef;display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;flex-shrink:0}
.btn-modal{padding:8px 18px;border:none;border-radius:24px;font-weight:600;cursor:pointer;transition:all .2s;font-size:13px}
.btn-modal.primary{background:#e60023;color:#fff}
.btn-modal.primary:hover{background:#ad081b}
.btn-modal.secondary{background:#efefef;color:#211922}
.btn-modal.secondary:hover{background:#e1e1e1}
.json-preview{background:#f5f5f5;padding:15px;border-radius:8px;font-family:'Courier New',monospace;font-size:12px;overflow-x:auto;white-space:pre-wrap;word-wrap:break-word}
.stats-box{background:#f0f7ff;padding:15px;border-radius:8px;margin-bottom:15px}
.stats-box h3{margin:0 0 10px;color:#0066ff;font-size:14px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.stat-item{text-align:center}
.stat-number{font-size:22px;font-weight:bold;color:#211922}
.stat-label{font-size:11px;color:#5f5f5f;margin-top:4px}
.video-wrap{background:#000;flex:1;display:flex;align-items:center;justify-content:center;min-height:0;overflow:hidden}
.video-wrap video{max-width:100%;max-height:100%;display:block}
.video-controls{background:#111;padding:12px 16px;display:flex;flex-direction:column;gap:10px;flex-shrink:0}
.timeline-wrap{display:flex;align-items:center;gap:10px}
.timeline-wrap span{color:#aaa;font-size:12px;font-family:monospace;min-width:44px;text-align:center}
.timeline{flex:1;-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;background:#444;outline:none;cursor:pointer}
.timeline::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#e60023;cursor:pointer}
.vol-row{display:flex;align-items:center;gap:10px}
.vc-btn{background:none;border:none;color:#fff;cursor:pointer;font-size:18px;padding:4px 8px;border-radius:6px;transition:background .2s;line-height:1}
.vc-btn:hover{background:#333}
.vol-slider{width:80px;-webkit-appearance:none;appearance:none;height:3px;border-radius:2px;background:#555;outline:none;cursor:pointer}
.vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#fff;cursor:pointer}
.speed-select{background:#222;color:#fff;border:1px solid #444;border-radius:6px;padding:4px 8px;font-size:12px;cursor:pointer;outline:none}
.vc-spacer{flex:1}
.three-wrap{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden}
.three-canvas-wrap{flex:1;position:relative;min-height:0;overflow:hidden}
.three-canvas-wrap canvas{width:100%!important;height:100%!important;display:block}
.env-panel{position:absolute;top:10px;right:10px;background:rgba(10,10,10,.82);border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:8px;width:220px;z-index:10;backdrop-filter:blur(4px)}
.env-section-title{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.6px;margin-top:4px}
.env-section-title:first-child{margin-top:0}
.sky-btns{display:flex;gap:5px}
.sky-btn{flex:1;padding:5px 4px;font-size:11px;background:rgba(255,255,255,.08);color:#ccc;border:1px solid rgba(255,255,255,.15);border-radius:6px;cursor:pointer;transition:all .2s;font-weight:600}
.sky-btn:hover{background:rgba(255,255,255,.16)}
.sky-btn.active{background:#e60023;color:#fff;border-color:#e60023}
.env-row{display:flex;align-items:center;gap:6px}
.env-row label{font-size:11px;color:#bbb;width:76px;flex-shrink:0}
.env-row input[type=range]{flex:1;accent-color:#e60023;height:3px;cursor:pointer}
.env-row span{font-size:11px;color:#fff;min-width:32px;text-align:right}
.env-row input[type=color]{width:34px;height:24px;border:none;cursor:pointer;border-radius:4px;padding:1px}
.env-row input[type=number]{width:52px;background:#222;color:#fff;border:1px solid #444;border-radius:4px;padding:2px 4px;font-size:11px;outline:none}
.hdr-url-row{display:flex;flex-direction:column;gap:4px}
.hdr-url-row label{font-size:11px;color:#bbb}
.hdr-url-input{background:#1a1a1a;color:#ccc;border:1px solid #444;border-radius:5px;padding:4px 6px;font-size:10px;outline:none;width:100%;font-family:monospace}
.hdr-url-input:focus{border-color:#e60023}
.hdr-load-btn{margin-top:2px;padding:5px;font-size:11px;background:#e60023;color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:600;width:100%}
.hdr-load-btn:hover{background:#ad081b}
#guiContainer .lil-gui{--background-color:#111;--text-color:#eee;--title-background-color:#1a1a1a;--widget-color:#2a2a2a;--hover-color:#333;--focus-color:#444;--number-color:#88ccff;--string-color:#88ffcc;max-height:80vh;overflow-y:auto}
</style>

<div class="loading-screen" id="loadingScreen" style="display:none">
  <div class="loading-spinner"></div>

<div class="modal-overlay" id="modalJSON">
  <div class="modal-content sm">
    <div class="modal-header">
      <h2>JSON de Archivos</h2>
      <button class="btn-modal secondary" id="btnCloseModal">✕</button>
    </div>
    <div class="modal-body" style="padding:20px;overflow-y:auto">
      <div class="stats-box" id="statsContainer"></div>

    </div>

<div class="modal-overlay" id="modalVideo">

      <h2 id="videoModalTitle" style="color:#fff">Video</h2>

<script type="module">
import * as THREE from 'three';
import { OrbitControls }    from 'three/addons/controls/OrbitControls';
import { GLTFLoader }       from 'three/addons/loaders/GLTFLoader';
import { OBJLoader }        from 'three/addons/loaders/OBJLoader';
import { FBXLoader }        from 'three/addons/loaders/FBXLoader';
import { RGBELoader }       from 'three/addons/loaders/RGBELoader';
import { Sky }              from 'three/addons/objects/Sky';
import { RoomEnvironment }  from 'three/addons/environments/RoomEnvironment';
import { DebugEnvironment } from 'three/addons/environments/DebugEnvironment';
import { GUI }              from 'three/addons/libs/lil-gui';

const fmtTime = s => { s=Math.floor(s||0); return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; };

const VideoModal = (() => {
  const vid=document.getElementById('modalVideoEl');
  const tl=document.getElementById('vcTimeline');
  const cur=document.getElementById('vcCurrent'), dur=document.getElementById('vcDuration');
  const btnPlay=document.getElementById('vcPlay'), btnMute=document.getElementById('vcMute');
  const volSl=document.getElementById('vcVol'), speedSel=document.getElementById('vcSpeed');
  let dragging=false;
  vid.ontimeupdate=()=>{if(!dragging){tl.value=vid.currentTime;cur.textContent=fmtTime(vid.currentTime);}};
  vid.onloadedmetadata=()=>{tl.max=vid.duration;dur.textContent=fmtTime(vid.duration);};
  vid.onplay=()=>btnPlay.innerHTML='&#9646;&#9646;';
  vid.onpause=()=>btnPlay.innerHTML='&#9654;';
  tl.oninput=()=>{dragging=true;cur.textContent=fmtTime(tl.value);};
  tl.onchange=()=>{vid.currentTime=tl.value;dragging=false;};
  btnPlay.onclick=()=>vid.paused?vid.play():vid.pause();
  btnMute.onclick=()=>{vid.muted=!vid.muted;btnMute.innerHTML=vid.muted?'&#128264;':'&#128266;';};
  volSl.oninput=()=>{vid.volume=volSl.value;vid.muted=+volSl.value===0;btnMute.innerHTML=vid.muted?'&#128264;':'&#128266;';};
  document.getElementById('vcBack').onclick=()=>vid.currentTime=Math.max(0,vid.currentTime-5);
  document.getElementById('vcFwd').onclick=()=>vid.currentTime=Math.min(vid.duration||0,vid.currentTime+10);
  speedSel.onchange=()=>vid.playbackRate=+speedSel.value;
  document.getElementById('vcFs').onclick=()=>{const w=document.getElementById('modalVideo');(w.requestFullscreen||w.webkitRequestFullscreen).call(w);};
  document.addEventListener('keydown',e=>{
    if(!document.getElementById('modalVideo').classList.contains('active'))return;
    if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT')return;
    if(e.code==='Space'){e.preventDefault();vid.paused?vid.play():vid.pause();}
    else if(e.code==='ArrowLeft')vid.currentTime=Math.max(0,vid.currentTime-5);
    else if(e.code==='ArrowRight')vid.currentTime=Math.min(vid.duration||0,vid.currentTime+10);
    else if(e.code==='ArrowUp'){vid.volume=Math.min(1,vid.volume+.1);volSl.value=vid.volume;}
    else if(e.code==='ArrowDown'){vid.volume=Math.max(0,vid.volume-.1);volSl.value=vid.volume;}
    else if(e.key==='m'||e.key==='M'){vid.muted=!vid.muted;btnMute.innerHTML=vid.muted?'&#128264;':'&#128266;';}
  });
  return {
    open(url,nombre){document.getElementById('videoModalTitle').textContent=nombre;vid.src=url;vid.load();vid.play().catch(()=>{});document.getElementById('modalVideo').classList.add('active');},
    close(){vid.pause();vid.src='';document.getElementById('modalVideo').classList.remove('active');}
  };
})();

const ThreeModal = (() => {
  let renderer=null,scene=null,camera=null,controls=null;
  let sky=null,ambL=null,dirL=null,rafId=null,resObs=null;
  let loadedObj=null, gui=null;

  const DEFAULT_HDR = 'https://threejs.org/examples/textures/equirectangular/quarry_01_1k.hdr';

  const params = {
    envMap: 'HDR',
    hdrUrl: DEFAULT_HDR,
    roughness: 0.0,
    metalness: 0.0,
    envMapIntensity: 1.0,
    exposure: 1.0,
    albedo: '#ffffff',
    ambientIntensity: 0.0,
    dirIntensity: 0.0,
    bgColor: '#222222'
  };

  const clearSky = () => { if(sky){scene.remove(sky);sky=null;} };

  const applyMaterial = () => {
    if(!loadedObj) return;
    const color = new THREE.Color(params.albedo);
    loadedObj.traverse(o => {
      if(!o.isMesh) return;
      if(!o.material) o.material = new THREE.MeshStandardMaterial();
      const mats = [].concat(o.material);
      mats.forEach((m,i) => {
        let mat = m;
        if(!(mat instanceof THREE.MeshStandardMaterial)) {
          mat = new THREE.MeshStandardMaterial({map: m.map||null});
          Array.isArray(o.material) ? o.material[i]=mat : o.material=mat;
        }
        mat.color.set(color);
        mat.roughness = params.roughness;
        mat.metalness = params.metalness;
        mat.envMapIntensity = params.envMapIntensity;
        mat.needsUpdate = true;
      });
    });
  };

  const applyEnv = tex => {
    scene.environment = tex;
    scene.background = tex;
    applyMaterial();
  };

  const loadHDR = url => {
    const pmrem = new THREE.PMREMGenerator(renderer);
    pmrem.compileEquirectangularShader();
    new RGBELoader().load(url, tex => {
      tex.mapping = THREE.EquirectangularReflectionMapping;
      const rt = pmrem.fromEquirectangular(tex);
      applyEnv(rt.texture);
      scene.background = rt.texture;
      tex.dispose(); pmrem.dispose();
    }, undefined, ()=>{});
  };

  const applySkyProc = () => {
    clearSky();
    sky = new Sky(); sky.scale.setScalar(450000); scene.add(sky);
    scene.background = null;
    scene.environment = null;
    applyMaterial();
  };

  const buildRoom = () => {
    clearSky();
    const pmrem = new THREE.PMREMGenerator(renderer);
    const env = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
    applyEnv(env); pmrem.dispose();
  };

  const buildDebug = () => {
    clearSky();
    const pmrem = new THREE.PMREMGenerator(renderer);
    const env = pmrem.fromScene(new DebugEnvironment()).texture;
    applyEnv(env); pmrem.dispose();
  };

  const buildSolid = () => {
    clearSky();
    scene.environment = null;
    scene.background = new THREE.Color(params.bgColor);
    applyMaterial();
  };

  const switchEnv = () => {
    if(params.envMap==='HDR') loadHDR(params.hdrUrl);
    else if(params.envMap==='Sky') applySkyProc();
    else if(params.envMap==='Room') buildRoom();
    else if(params.envMap==='Debug') buildDebug();
    else if(params.envMap==='Solid') buildSolid();
  };

  const buildGUI = () => {
    if(gui) { gui.destroy(); gui=null; }
    const container = document.getElementById('guiContainer');
    gui = new GUI({ container, width: 240, title: 'Configuración' });

    const envF = gui.addFolder('Entorno');
    envF.add(params,'envMap',['HDR','Sky','Room','Debug','Solid']).name('tipo').onChange(switchEnv);
    envF.add(params,'hdrUrl').name('URL HDR').onFinishChange(v=>{ if(params.envMap==='HDR') loadHDR(v); });
    envF.add(renderer,'toneMappingExposure',0,4,0.01).name('exposición');
    envF.open();

    const matF = gui.addFolder('Material');
    matF.addColor(params,'albedo').name('albedo').onChange(applyMaterial);
    matF.add(params,'roughness',0,1,0.01).name('roughness').onChange(applyMaterial);
    matF.add(params,'metalness',0,1,0.01).name('metalness').onChange(applyMaterial);
    matF.add(params,'envMapIntensity',0,5,0.05).name('env intensity').onChange(applyMaterial);
    matF.open();

    const lightF = gui.addFolder('Luces');
    lightF.add(params,'ambientIntensity',0,3,0.05).name('ambiente').onChange(v=>{ if(ambL) ambL.intensity=v; });
    lightF.add(params,'dirIntensity',0,5,0.1).name('direccional').onChange(v=>{ if(dirL) dirL.intensity=v; });
    lightF.open();
  };

  const fitCamera = obj => {
    obj.updateMatrixWorld(true);
    const box = new THREE.Box3().setFromObject(obj);
    if(box.isEmpty()) return;
    const size   = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());
    const fovRad = camera.fov * Math.PI / 180;
    const fovH   = 2 * Math.atan(Math.tan(fovRad / 2) * camera.aspect);
    const distV  = (size.y / 2) / Math.tan(fovRad / 2);
    const distH  = (size.x / 2) / Math.tan(fovH / 2);
    const dist   = Math.max(distV, distH, Math.max(size.x,size.y,size.z)) * 1.8;
    camera.near  = Math.max(dist / 1000, 0.001);
    camera.far   = dist * 200;
    camera.updateProjectionMatrix();
    camera.position.set(center.x + dist*0.35, center.y + dist*0.25, center.z + dist);
    camera.lookAt(center);
    controls.target.copy(center);
    controls.minDistance = dist * 0.05;
    controls.maxDistance = dist * 20;
    controls.update();
  };

  const dispose = () => {
    if(gui){ gui.destroy(); gui=null; }
    if(rafId){ cancelAnimationFrame(rafId); rafId=null; }
    if(resObs){ resObs.disconnect(); resObs=null; }
    if(renderer){
      scene.traverse(o=>{ if(o.isMesh){ o.geometry?.dispose(); [].concat(o.material).forEach(m=>m?.dispose()); } });
      renderer.dispose();
      scene=null; camera=null; renderer=null; controls=null; sky=null; ambL=null; dirL=null; loadedObj=null;
    }
  };

  return {
    MODEL_THUMB: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTnBg6cLuer28Z5mIhmk2pdS8Nsz-mPjxwXWw&s',
    initSliders() {},
    async open(modelData){
      document.getElementById('modal3DTitle').textContent = modelData.nombre;
      document.getElementById('modal3D').classList.add('active');
      await new Promise(r=>setTimeout(r,60));

      const canvas = document.getElementById('threeCanvas');
      const wrap   = document.getElementById('threeWrap');
      const w = wrap.clientWidth, h = Math.max(wrap.clientHeight, 500);

      scene    = new THREE.Scene();
      camera   = new THREE.PerspectiveCamera(60, w/h, 0.001, 100000);
      renderer = new THREE.WebGLRenderer({canvas, antialias:true, preserveDrawingBuffer:true});
      renderer.setSize(w, h, false);
      renderer.setPixelRatio(devicePixelRatio);
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = params.exposure;

      ambL = new THREE.AmbientLight(0xffffff, params.ambientIntensity);
      dirL = new THREE.DirectionalLight(0xffffff, params.dirIntensity);
      dirL.position.set(5,10,5);
      scene.add(ambL, dirL);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;

      buildGUI();
      params.envMap = 'HDR';
      loadHDR(params.hdrUrl);

      document.getElementById('loadingScreen').style.display='flex';
      document.querySelector('.loading-text').textContent='Cargando modelo 3D...';
      try {
        const ext = modelData.extension;
        const loaderMap = {'.glb':GLTFLoader,'.gltf':GLTFLoader,'.obj':OBJLoader,'.fbx':FBXLoader};
        const Loader = loaderMap[ext];
        if(!Loader) throw new Error('Formato no soportado: '+ext);
        const loader = new Loader();
        let obj;
        if(ext==='.glb'||ext==='.gltf'){ const gg=await loader.loadAsync(modelData.url); obj=gg.scene; }
        else { obj = await loader.loadAsync(modelData.url); }

        obj.traverse(o => {
          if(!o.isMesh) return;
          if(!o.material) o.material = new THREE.MeshStandardMaterial({color:0xffffff,roughness:.5,metalness:0});
          const mats = [].concat(o.material);
          mats.forEach((m,i) => {
            if(!(m instanceof THREE.MeshStandardMaterial)){
              const nm = new THREE.MeshStandardMaterial({color:0xffffff,roughness:.5,metalness:0,map:m.map||null});
              Array.isArray(o.material) ? o.material[i]=nm : o.material=nm;
            }
          });
        });

        loadedObj = obj;
        scene.add(obj);
        renderer.render(scene, camera);
        fitCamera(obj);

        const animate = () => { rafId=requestAnimationFrame(animate); controls.update(); renderer.render(scene,camera); };
        animate();

        resObs = new ResizeObserver(()=>{
          const nw=wrap.clientWidth, nh=wrap.clientHeight;
          camera.aspect=nw/nh; camera.updateProjectionMatrix(); renderer.setSize(nw,nh,false);
        });
        resObs.observe(wrap);
      } catch(e){ alert('Error al cargar modelo: '+e.message); this.close(); }
      finally { document.getElementById('loadingScreen').style.display='none'; }
    },
    close(){ dispose(); document.getElementById('modal3D').classList.remove('active'); }
  };
})();

class PintarestaGallery {
  constructor(){
    this.todasLasUrls=[];
    this.urlsFiltradas=[];
    this.loteActual=0;
    this.imagenesPorLote=30;
    this.repositorios=[
        {owner:'unonibes4a',name:'newImgs'},
      {owner:'unonibes4a',name:'newimg2'},
      {owner:'unonibes4a',name:'newimg3'},
      {owner:'unonibes4a',name:'newimg4'},
      {owner:'unonibes4a',name:'newimg5'},
      {owner:'unonibes4a',name:'storeImg'},
      {owner:'unonibes4a',name:'newimg'},
      {owner:'unonibes4a',name:'newimg6'}  ,
       {owner:'unonibes4a',name:'repjob'} 
    ];
    this.extensionesValidas={
      imagen:['.jpg','.jpeg','.png','.gif','.bmp','.webp','.svg','.tiff','.tif','.ico','.heic','.heif'],
      video:['.mp4','.webm','.avi','.mov','.mkv','.flv','.wmv','.m4v','.mpeg','.mpg','.3gp'],
      model:['.glb','.gltf','.obj','.fbx']
    };
    this.jsonData=null;
  }
  esImagen(n){return this.extensionesValidas.imagen.includes(n.toLowerCase().substring(n.lastIndexOf('.')));}
  esVideo(n){return this.extensionesValidas.video.includes(n.toLowerCase().substring(n.lastIndexOf('.')));}
  esModelo3D(n){return this.extensionesValidas.model.includes(n.toLowerCase().substring(n.lastIndexOf('.')));}
  esMediaValido(n){return this.esImagen(n)||this.esVideo(n)||this.esModelo3D(n);}
  obtenerNombreArchivo(p){return p.split('/').pop().replace(/\.[^/.]+$/,'');}
  formatBytes(b){if(!b)return '0 B';const k=1024,s=['B','KB','MB','GB'],i=Math.floor(Math.log(b)/Math.log(k));return parseFloat((b/Math.pow(k,i)).toFixed(2))+' '+s[i];}
  barajarArray(a){const s=[...a];for(let i=s.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[s[i],s[j]]=[s[j],s[i]];}return s;}
  async cargarDesdeDirectorio(url,rutaBase='',repoName=''){
    const urls=[];
    try{const r=await fetch(url);if(!r.ok)return urls;const data=await r.json();
      for(const item of data){
        if(item.type==='file'&&this.esMediaValido(item.name)){
          const tipo=this.esImagen(item.name)?'imagen':this.esVideo(item.name)?'video':'model';
          urls.push({url:item.download_url,nombre:this.obtenerNombreArchivo(item.name),repo:repoName,tipo,extension:item.name.toLowerCase().substring(item.name.lastIndexOf('.'))});
        }else if(item.type==='dir'){urls.push(...await this.cargarDesdeDirectorio(item.url,`${rutaBase}${item.name}/`,repoName));}
      }
    }catch(e){}
    return urls;
  }
  async cargarDesdeRepositorio(repo){try{return await this.cargarDesdeDirectorio(`https://api.github.com/repos/${repo.owner}/${repo.name}/contents`,'',repo.name);}catch(e){return [];}}
  async cargarDesdeMultiplesRepos(){
    this.mostrarCargando(true,'Cargando repositorios...');
    try{const todos=(await Promise.all(this.repositorios.map(r=>this.cargarDesdeRepositorio(r)))).flat();if(!todos.length)throw new Error('No se encontraron archivos');return this.barajarArray(todos);}
    catch(e){document.getElementById('pinsContainer').innerHTML=`<div style="text-align:center;padding:40px;color:#767676"><h3>Error</h3><p>${e.message}</p></div>`;return[];}
    finally{this.mostrarCargando(false);}
  }
  async procesarArchivosLocales(files){
    const validos=[],promesas=[];let img=0,vid=0,mod=0;
    for(const file of files){
      if(!this.esMediaValido(file.name))continue;
      const tipo=this.esImagen(file.name)?(img++,'imagen'):this.esVideo(file.name)?(vid++,'video'):(mod++,'model');
      promesas.push(new Promise(resolve=>{
        const reader=new FileReader();
        reader.onload=async e=>{
          const ext=file.name.substring(file.name.lastIndexOf('.')).toLowerCase();
          const d={url:e.target.result,nombre:this.obtenerNombreArchivo(file.name),nombreCompleto:file.name,repo:'Local',tipo,extension:ext,tamaño:file.size,tamañoLegible:this.formatBytes(file.size),fechaModificacion:file.lastModified,ruta:file.webkitRelativePath||file.name};
          validos.push(d);resolve();
        };
        reader.readAsDataURL(file);
      }));
    }
    await Promise.all(promesas);
    this.jsonData={fecha_generacion:new Date().toISOString(),total_archivos:validos.length,imagenes:img,videos:vid,modelos:mod,archivos:validos.map(a=>({nombre:a.nombre,nombreCompleto:a.nombreCompleto,ruta:a.ruta,tipo:a.tipo,extension:a.extension,tamaño:a.tamañoLegible,fechaModificacion:new Date(a.fechaModificacion).toISOString()}))};
    return validos;
  }
  async cargarArchivosLocales(files){
    this.mostrarCargando(true,'Procesando archivos y generando miniaturas...');
    try{const local=await this.procesarArchivosLocales(files);if(!local.length){alert('No se encontraron archivos válidos');return;}
      this.todasLasUrls=this.barajarArray(local);this.urlsFiltradas=[...this.todasLasUrls];this.loteActual=0;this.mostrarLote();
      document.getElementById('btnViewJSON').style.display='block';
      alert(`Cargados ${local.length} archivos\nImagenes: ${this.jsonData.imagenes}\nVideos: ${this.jsonData.videos}\nModelos 3D: ${this.jsonData.modelos}`);
    }catch(e){alert('Error: '+e.message);}finally{this.mostrarCargando(false);}
  }
  mostrarJSON(){
    if(!this.jsonData){alert('Primero carga una carpeta');return;}
    document.getElementById('statsContainer').innerHTML=`<h3>Estadisticas</h3><div class="stats-grid"><div class="stat-item"><div class="stat-number">${this.jsonData.total_archivos}</div><div class="stat-label">Total</div></div><div class="stat-item"><div class="stat-number">${this.jsonData.imagenes}</div><div class="stat-label">Imagenes</div></div><div class="stat-item"><div class="stat-number">${this.jsonData.videos}</div><div class="stat-label">Videos</div></div><div class="stat-item"><div class="stat-number">${this.jsonData.modelos}</div><div class="stat-label">Modelos 3D</div></div></div>`;
    document.getElementById('jsonPreview').textContent=JSON.stringify(this.jsonData,null,2);
    document.getElementById('modalJSON').classList.add('active');
  }
  descargarJSON(){if(!this.jsonData)return;const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(this.jsonData,null,2)],{type:'application/json'}));a.download=`galeria_${Date.now()}.json`;document.body.appendChild(a);a.click();document.body.removeChild(a);}
  copiarJSON(){if(!this.jsonData)return;navigator.clipboard.writeText(JSON.stringify(this.jsonData,null,2)).then(()=>alert('JSON copiado')).catch(()=>alert('Error al copiar'));}
  mostrarCargando(show,msg='Cargando...'){document.getElementById('loadingScreen').style.display=show?'flex':'none';document.querySelector('.loading-text').textContent=msg;}
  crearPinElement(mediaData){
    const pin=document.createElement('div');pin.className='pin';
    const alturas=['h-280','h-320','h-360','h-400','h-440'];
    const alt=alturas[Math.floor(Math.random()*alturas.length)];
    const esLocal=mediaData.repo==='Local';
    const av=esLocal?'PC':'GH',cr=esLocal?'Mi PC':'GitHub';
    const desc=mediaData.repo+(esLocal&&mediaData.tamañoLegible?' - '+mediaData.tamañoLegible:'');
    const infoHTML=`<div class="pin-info"><div class="pin-title">${mediaData.nombre}</div><div class="pin-description">${desc}</div><div class="pin-creator"><div class="creator-avatar">${av}</div><div class="creator-name">${cr}</div></div></div>`;
    if(mediaData.tipo==='video'){
      pin.innerHTML=`<div class="pin-image-container"><video class="pin-image ${alt}" ${esLocal?'src':'data-src'}="${mediaData.url}" muted loop playsinline preload="none"></video><div class="media-badge">VIDEO</div><button class="save-btn">Guardar</button></div>${infoHTML}`;
      const v=pin.querySelector('video');
      if(!esLocal&&v.dataset.src){const ob=new IntersectionObserver(e=>{if(e[0].isIntersecting&&v.dataset.src){v.src=v.dataset.src;v.load();v.removeAttribute('data-src');ob.unobserve(v);}});ob.observe(v);}
      v.addEventListener('mouseenter',()=>v.play().catch(()=>{}));
      v.addEventListener('mouseleave',()=>{v.pause();v.currentTime=0;});
      v.onclick=e=>{e.stopPropagation();VideoModal.open(mediaData.url,mediaData.nombre);};
    }else if(mediaData.tipo==='imagen'){
      pin.innerHTML=`<div class="pin-image-container"><img class="pin-image ${alt}" ${esLocal?'src':'data-src'}="${mediaData.url}" alt="${mediaData.nombre}" loading="lazy"><button class="save-btn">Guardar</button></div>${infoHTML}`;
      const img=pin.querySelector('img');
      if(!esLocal&&img.dataset.src){const ob=new IntersectionObserver(e=>{if(e[0].isIntersecting&&img.dataset.src){img.src=img.dataset.src;img.removeAttribute('data-src');ob.unobserve(img);}});ob.observe(img);}
      img.onclick=e=>{e.stopPropagation();if(window.appEditorgioBasico?.parentElement){window.appEditorgioBasico.setImage(img.src);window.appEditorgioBasico.openappf();}};
      img.onerror=function(){this.style.background='#f0f0f0';this.alt='Error';};
    }else if(mediaData.tipo==='model'){
      const thumb=ThreeModal.MODEL_THUMB;
      pin.innerHTML=`<div class="pin-image-container"><img class="pin-image model-thumb ${alt}" src="${thumb}" alt="${mediaData.nombre}" data-model="${mediaData.nombre}" loading="lazy"><div class="media-badge">3D MODEL</div><button class="save-btn">Guardar</button></div>${infoHTML}`;
      pin.querySelector('img').onclick=e=>{e.stopPropagation();ThreeModal.open(mediaData);};
    }
    const saveBtn=pin.querySelector('.save-btn');
    if(saveBtn)saveBtn.onclick=e=>{e.stopPropagation();const a=document.createElement('a');a.href=mediaData.url;a.download=mediaData.nombreCompleto||`${mediaData.nombre}${mediaData.extension}`;document.body.appendChild(a);a.click();document.body.removeChild(a);};
    return pin;
  }
  obtenerLoteActual(){const i=this.loteActual*this.imagenesPorLote;return this.barajarArray(this.urlsFiltradas.slice(i,i+this.imagenesPorLote));}
  actualizarBotones(){
    const total=Math.ceil(this.urlsFiltradas.length/this.imagenesPorLote);
    document.getElementById('btnBack').disabled=this.loteActual===0;
    document.getElementById('btnNext').disabled=this.loteActual>=total-1;
    const i=this.loteActual*this.imagenesPorLote+1,f=Math.min((this.loteActual+1)*this.imagenesPorLote,this.urlsFiltradas.length);
    const img=this.urlsFiltradas.filter(m=>m.tipo==='imagen').length,vid=this.urlsFiltradas.filter(m=>m.tipo==='video').length,mod=this.urlsFiltradas.filter(m=>m.tipo==='model').length;
    document.getElementById('loteInfo').textContent=`${i}-${f} de ${this.urlsFiltradas.length} (IMG ${img} VID ${vid} 3D ${mod})`;
  }
  mostrarLote(){
    const c=document.getElementById('pinsContainer');c.innerHTML='';
    const archivos=this.obtenerLoteActual();
    if(!archivos.length){c.innerHTML='<div style="text-align:center;padding:40px;color:#767676;grid-column:1/-1">No hay archivos</div>';return;}
    const frag=document.createDocumentFragment();
    archivos.forEach(m=>frag.appendChild(this.crearPinElement(m)));
    c.appendChild(frag);this.actualizarBotones();
    window.scrollTo({top:0,behavior:'smooth'});
  }
  filtrarMedia(q){
    const b=q.toLowerCase().trim();
    this.urlsFiltradas=b?this.todasLasUrls.filter(m=>m.nombre.toLowerCase().includes(b)||m.repo.toLowerCase().includes(b)||(m.tipo==='model'&&'3d model'.includes(b))):[...this.todasLasUrls];
    this.loteActual=0;this.mostrarLote();
  }
  async siguienteLote(){if(this.loteActual<Math.ceil(this.urlsFiltradas.length/this.imagenesPorLote)-1){this.loteActual++;this.mostrarLote();}}
  async loteAnterior(){if(this.loteActual>0){this.loteActual--;this.mostrarLote();}}
  async recargar(){this.loteActual=0;await this.iniciar();}
  async iniciar(){const urls=await this.cargarDesdeMultiplesRepos();if(urls.length){this.todasLasUrls=urls;this.urlsFiltradas=[...urls];this.loteActual=0;this.mostrarLote();}}
}

document.addEventListener('DOMContentLoaded',()=>{
  ThreeModal.initSliders();
  const g=new PintarestaGallery();
  document.getElementById('btnBack').onclick=()=>g.loteAnterior();
  document.getElementById('btnNext').onclick=()=>g.siguienteLote();
  document.getElementById('btnReload').onclick=()=>g.recargar();
  document.getElementById('fileInput').onchange=e=>{if(e.target.files.length)g.cargarArchivosLocales(e.target.files);};
  document.getElementById('btnViewJSON').onclick=()=>g.mostrarJSON();
  document.getElementById('btnCloseModal').onclick=()=>document.getElementById('modalJSON').classList.remove('active');
  document.getElementById('btnCopyJSON').onclick=()=>g.copiarJSON();
  document.getElementById('btnDownloadJSON').onclick=()=>g.descargarJSON();
  document.getElementById('modalJSON').onclick=e=>{if(e.target===document.getElementById('modalJSON'))document.getElementById('modalJSON').classList.remove('active');};
  document.getElementById('btnCloseVideo').onclick=()=>VideoModal.close();
  document.getElementById('modalVideo').onclick=e=>{if(e.target===document.getElementById('modalVideo'))VideoModal.close();};
  document.getElementById('btnClose3D').onclick=()=>ThreeModal.close();
  document.getElementById('modal3D').onclick=e=>{if(e.target===document.getElementById('modal3D'))ThreeModal.close();};
  let t;document.getElementById('searchInput').oninput=e=>{clearTimeout(t);t=setTimeout(()=>g.filtrarMedia(e.target.value),300);};
  document.addEventListener('keydown',e=>{
    if(document.getElementById('modal3D').classList.contains('active')){if(e.key==='Escape')ThreeModal.close();return;}
    if(document.getElementById('modalVideo').classList.contains('active')){if(e.key==='Escape')VideoModal.close();return;}
    if(document.getElementById('modalJSON').classList.contains('active')){if(e.key==='Escape')document.getElementById('modalJSON').classList.remove('active');return;}
    if(e.target.tagName==='INPUT')return;
    if(e.key==='ArrowLeft')g.loteAnterior();
    else if(e.key==='ArrowRight')g.siguienteLote();
    else if(e.key==='r'||e.key==='R')g.recargar();
  });
  g.iniciar();
  window.galeriaPintaresta=g;
});
</script>
